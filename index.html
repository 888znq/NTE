<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>News Ticker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAYHA8Qw3Qw3Qzbyg8MtjrSKcJusNi4VaA6V4",
    authDomain: "system-data-bf026.firebaseapp.com",
    databaseURL: "https://system-data-bf026-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "system-data-bf026",
    storageBucket: "system-data-bf026.firebasestorage.app",
    messagingSenderId: "718302899022",
    appId: "1:718302899022:web:f1675dbcc293e138c68c1f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.__db = db;
  window.__ref = ref;
  window.__push = push;
  window.__onValue = onValue;
  window.__remove = remove;
  window.__update = update;
  window.__set = set;
</script>
<style>
  html,body{margin:0;height:100%;font-family:'Roboto Mono',monospace;background:#000432;overflow:hidden}
      .stack{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:row;gap:10px;padding:35px;box-sizing:border-box;overflow:visible;background:#000432}
        .stack::-webkit-scrollbar{display:none;width:0;height:0}
         .bar{flex:1;height:100%;color:#fff;border-radius:14px;position:relative;padding:12px 14px;box-sizing:border-box;box-shadow:none;display:flex;flex-direction:column;min-width:0}
              .bar.dragging{opacity:.6;outline:3px dashed #fff;outline-offset:-3px;z-index:5}
              .boxInner{display:flex;flex-direction:column;justify-content:flex-end;gap:24px;flex:1;min-height:0;overflow:hidden}
         .noteLine{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-shrink:0}
                  .dot{width:8px;height:8px;min-width:8px;border-radius:50%;background:rgba(255,255,255,.85);box-shadow:0 0 4px rgba(255,255,255,.6);flex-shrink:0;margin-top:22px}
    .track{white-space:normal;word-break:break-word;font-family:'Roboto Mono',monospace;font-size:38px;line-height:1.35;font-weight:700;letter-spacing:.2px;flex:1;outline:none !important;border:none !important;box-shadow:none !important;cursor:text;min-width:20px;color:#fff;text-shadow:none}
        .newNoteLine{min-height:40px;cursor:text}
      .boxHead{display:none;width:100%;font-family:'Georgia',serif;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.45);background:transparent;border:none;font-size:26px;font-weight:700;letter-spacing:1px;margin-top:auto;padding:8px 0 0 0;border-top:1px solid rgba(255,255,255,.5);outline:none;flex-shrink:0;box-sizing:border-box;text-align:center}
                    .boxHead::placeholder{color:#fff;opacity:.55;text-transform:none}
                    .boxHead:focus{border-top-color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.6)}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}
       form{position:fixed;bottom:0;left:0;width:100%;height:var(--formH);background:#1a1a1a;display:flex;align-items:center;justify-content:center;padding:6px 10px;box-sizing:border-box;z-index:2}
             #colorPicker{height:100%;display:flex;align-items:center;justify-content:center;gap:8px;overflow-x:auto}
      .swatch{width:28px;height:28px;min-width:28px;border-radius:50%;border:3px solid transparent;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
      .swatch.selected{border-color:#fff}
      .noteRow{height:9.09vh;display:flex;align-items:center;gap:8px}
      #noteBox{flex:1;padding:8px;height:70%;font-size:min(4.5vh,4vw);box-sizing:border-box;font-family:inherit;background:#fff;color:#000;border-radius:4px;display:flex;align-items:center;overflow:hidden;white-space:nowrap}
    #noteInput{width:100%;height:100%;border:none;outline:none;background:transparent;font-family:inherit;font-size:inherit;color:inherit;padding:0;margin:0}
    #noteInput:disabled{background:transparent;color:#000;opacity:1;-webkit-text-fill-color:#000}
    .noteRow button{padding:0 16px;height:70%;font-size:min(4.5vh,4vw);font-family:inherit}
      #kb{position:fixed;bottom:0;left:0;width:100%;height:28vh;background:#1e2124;box-sizing:border-box;padding:4px 3px;display:flex;flex-direction:column;gap:4px;z-index:2;touch-action:none;transition:transform 0.3s}
      body.kb-hidden #kb{transform:translateY(100%)}
      .krow{display:flex;flex:1;gap:4px;justify-content:center}
  .krow.indent{padding:0 3vw}
  .key{flex:1;background:#3a3d42;color:#fff;border:none;border-radius:5px;font-size:min(2vh,3.4vw);font-family:inherit;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none;transition:none;box-shadow:0 1px 0 rgba(0,0,0,.3)}
  .key.pressed{background:#5a5e64;transform:scale(0.92)}
  .key.func{background:#2b2e33;flex:1.5;font-size:min(1.8vh,2.8vw)}
  .key.func.pressed{background:#45484d}
  .key.wide{flex:1.5}
  .key.space{flex:8}
  .key.go{background:#3a86ff;flex:1.6}
  .key.go.pressed{background:#5a9aff}
     #lockBtn, #kbBtn{border-radius:4px;border:none;background:#444;color:#fff;-webkit-tap-highlight-color:transparent}
      #lockBtn.locked{background:#e63946}
      .lineActions{display:flex;gap:6px;opacity:0;transition:opacity .2s;flex-shrink:0}
            .noteLine:hover .lineActions, .noteLine:focus-within .lineActions{opacity:1}
      .btn-action{background:rgba(0,0,0,0.5);color:#fff;border:none;padding:6px 12px;border-radius:4px;font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
     </style>
</head>
<body>

<div class="stack" id="stack"></div>

<script>
window.addEventListener('load', initTicker);
function initTicker(){
  if(!window.__db){ setTimeout(initTicker, 50); return; }

  var palette = ["#000432"];
    var rows = []; // {key, text, color, order}
    var groupsCache = [];
    var titles = {};
    var selectedColor = palette[0];
    var activeColor = null;
    var touchX = 0, touchY = 0;
      var dragIndex = -1, holdTimer = null, dragging = false;
  
    var db = window.__db, dbRef = window.__ref, dbPush = window.__push,
          dbOnValue = window.__onValue, dbRemove = window.__remove,
          dbUpdate = window.__update, dbSet = window.__set;
    var notesRef = dbRef(db, "ticker_notes");
    var titlesRef = dbRef(db, "ticker_titles");
  
    function groupRows(){
      var map = new Map();
      rows.forEach(r => {
        if(!map.has(r.color)) map.set(r.color, []);
        map.get(r.color).push(r);
      });
      return [...map.entries()].map(([color, items]) => {
        var sorted = items.slice().sort((a,b)=>a.order-b.order);
        return { color, items: sorted, order: Math.min(...sorted.map(it=>it.order)) };
      }).sort((a,b)=>a.order-b.order);
    }
  
    function renderGroups(groups){
        document.getElementById('stack').innerHTML = palette.map((color, i) => {
          var g = groups.find(gr => gr.color === color) || { color, items: [] };
          return `
          <div class="bar" data-i="${i}" style="background:${g.color}" onclick="if(event.target===this)addNoteInline('${g.color}')">
            <div class="boxInner" onclick="if(event.target===this)addNoteInline('${g.color}')">
              ${g.items.map(it=>`
                <div class="noteLine">
                              <span class="dot"></span>
                              <span class="track" contenteditable="true" spellcheck="false" data-key="${it.key}"
                                         onclick="event.stopPropagation()"
                                         onblur="saveNoteText(this)"
                                         onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();addNoteInline('${g.color}');}">${it.text}</span>
                              <span class="lineActions">
                                <button type="button" class="btn-action" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation();deleteNote('${it.key}')">Del</button>
                              </span>
                            </div>`).join('')}
              <div class="newNoteLine" onclick="event.stopPropagation();addNoteInline('${g.color}')"></div>
            </div>
            <input type="text" class="boxHead" spellcheck="false" data-color="${g.color}" placeholder="${i === 0 ? 'EMERGENCY' : 'URGENT'}"
                             value="${(titles[g.color.replace('#','')] || '').replace(/"/g,'&quot;')}"
                             onpointerdown="event.stopPropagation()" onclick="event.stopPropagation()"
                             onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
                             onblur="saveTitle(this)" />
          </div>`;
        }).join('');
      }
  
    function render(){
          groupsCache = groupRows();
          renderGroups(groupsCache);
          fitNotes();
        }
    
      function fitNotes(){
        var inner = document.querySelector('.boxInner');
        if(!inner) return;
        var tracks = inner.querySelectorAll('.track');
        if(!tracks.length) return;
        var size = 38;
                tracks.forEach(t=> t.style.fontSize = size + 'px');
                var guard = 0;
                while(inner.scrollHeight > inner.clientHeight && size > 16 && guard < 30){
          size -= 1;
          tracks.forEach(t=> t.style.fontSize = size + 'px');
          guard++;
        }
      }
  
    dbOnValue(notesRef, (snapshot) => {
      var data = snapshot.val();
      if(!data){ rows = []; render(); return; }
      rows = Object.keys(data).map(key => {
        var val = data[key];
        if (typeof val === 'object' && val !== null) {
          return { key, text: val.text || val.note || '', color: val.color || '#0000FF', order: val.order ?? 0 };
        } else {
          return { key, text: String(val), color: '#0000FF', order: 0 };
        }
      }).sort((a,b) => a.order - b.order);
      render();
    });
  
    dbOnValue(titlesRef, (snapshot) => {
      titles = snapshot.val() || {};
      render();
    });
  
    function addNoteInline(color){
            var order = rows.length ? Math.max(...rows.map(r=>r.order ?? 0)) + 1 : 0;
          var newRef = dbPush(notesRef, { text: "", color, order });
          var key = newRef.key;
        setTimeout(()=>{
          var el = document.querySelector(`.track[data-key="${key}"]`);
          if(el) el.focus();
          fitNotes();
        }, 150);
      }
  
    function saveNoteText(el){
        var key = el.dataset.key;
        var text = el.textContent.trim();
        if(!text){ deleteNote(key); return; }
        dbUpdate(dbRef(db, `ticker_notes/${key}`), { text });
        fitNotes();
      }
  
    function touchStart(e,i){
           e.target.setPointerCapture(e.pointerId);
         touchX = e.clientX;
         touchY = e.clientY;
         dragging = false;
      holdTimer = setTimeout(()=>{
        dragging = true;
        dragIndex = i;
        document.querySelector(`.bar[data-i="${i}"]`).classList.add('dragging');
        if(navigator.vibrate) navigator.vibrate(30);
      }, 400);
    }
  
    function touchMove(e,i){
         var dx = e.clientX - touchX;
         var dy = e.clientY - touchY;
         if(!dragging){
           if(Math.abs(dx) > 10 || Math.abs(dy) > 10) clearTimeout(holdTimer);
         } else {
           var stackEl = document.getElementById('stack');
           var bars = [...stackEl.children];
           var touchYAbs = e.clientY;
           for(var b of bars){
            var rect = b.getBoundingClientRect();
            if(touchYAbs > rect.top && touchYAbs < rect.bottom){
              var overIndex = +b.dataset.i;
              if(overIndex !== dragIndex){
                var moved = groupsCache.splice(dragIndex,1)[0];
                groupsCache.splice(overIndex,0,moved);
                dragIndex = overIndex;
                renderGroups(groupsCache);
                document.querySelector(`.bar[data-i="${dragIndex}"]`).classList.add('dragging');
              }
              break;
            }
          }
        }
      }
  
    function touchEnd(e,i){
       clearTimeout(holdTimer);
       if(e.target.hasPointerCapture && e.target.hasPointerCapture(e.pointerId)) {
         e.target.releasePointerCapture(e.pointerId);
       }
       if(dragging){
              dragging = false;
              dragIndex = -1;
              var updates = {};
              var idx = 0;
              groupsCache.forEach(g => {
                g.items.forEach(it => { updates[`${it.key}/order`] = idx++; });
              });
              dbUpdate(notesRef, updates);
            }
          }
  
    function buildColorPicker(){
          var picker = document.getElementById('colorPicker');
          if(!picker) return;
          picker.innerHTML = palette.map(c=>`<button type="button" class="swatch${c===selectedColor?' selected':''}" style="background:${c}" data-c="${c}"></button>`).join('');
          picker.querySelectorAll('.swatch').forEach(btn=>{
            btn.addEventListener('click', ()=>{
              selectedColor = btn.dataset.c;
              activeColor = btn.dataset.c;
              picker.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
              btn.classList.add('selected');
              renderGroups(groupsCache);
            });
          });
        }
      buildColorPicker();
  
    window.touchStart = touchStart;
      window.touchMove = touchMove;
      window.touchEnd = touchEnd;
      window.addNoteInline = addNoteInline;
    window.saveNoteText = saveNoteText;
    window.deleteNote = function(key){
                  dbRemove(dbRef(db, `ticker_notes/${key}`));
                };
          window.saveTitle = function(el){
                    var key = el.dataset.color.replace('#','');
                    var text = el.value.trim();
                    dbSet(dbRef(db, `ticker_titles/${key}`), text);
                  };
  }
  </script>
</body>
</html>
